<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
				<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>♥ 新标签 ♥</title>
    <link rel="stylesheet" href="newtab.css">
				<link rel="icon" type="image/svg+xml" href="icons/logo.svg" />
				<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
				<link rel="manifest" href="site.webmanifest" />
				<meta property="og:type" content="website">
				<meta property="og:title" content="J-Nav 极简导航">
				<meta property="og:description" content="你的私人书签。">
				<meta property="og:image" content="https://8.828111.xyz/icons/logo.svg">
				<meta name="theme-color" content="#121212">
				<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
				<script src="https://gcore.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
				<script src="https://gcore.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
</head>
<body>
    <div id="nt-edge-trigger"></div>
    <div id="nt-sidebar" class="nt-sidebar">
        <div class="sidebar-header">更多分类</div>
        <div id="nt-sidebar-content"></div>
    </div>
    <div id="nt-overlay"></div>
    <button id="nt-menu-btn">☰</button> 

<div id="calendar-modal" class="modal-overlay">
    <div class="calendar-card">
        <div id="calendar-left"></div>

        <div class="calendar-right">
            <div class="right-header">
                <span id="res-year-month">2026年2月</span>
                <span id="res-date">27</span>
                <span id="res-day">星期五</span>
            </div>
            <div class="lunar-details">
                <div class="lunar-item">
                    <span class="label">农历</span>
                    <span id="res-lunar">正月十一</span>
                </div>
                <div class="lunar-item">
                    <span class="label">干支</span>
                    <span id="res-gz">丙午年 庚寅月</span>
                </div>
                <div class="lunar-item">
                    <span class="label">宜</span>
                    <span id="res-yi" class="yi">祭祀 沐浴</span>
                </div>
                <div class="lunar-item">
                    <span class="label">忌</span>
                    <span id="res-ji" class="ji">嫁娶 安葬</span>
                </div>
            </div>
            <button class="close-cal" onclick="closeCalendar()">关闭</button>
        </div>
    </div>
</div>

    <main class="nt-main">
					<div id="weather-container" class="nt-weather">
					        <div id="tp-weather-widget"></div> <div class="weather-text">
					            <span id="weather-city">城市</span>
					            <span id="weather-temp">--°C</span>
					            <span id="weather-desc">加载中</span>
					        </div>
					    </div>
        <header class="nt-header-sticky">
            <div class="header-section">
                <div id="clock" class="nt-clock">00:00</div>
																<div id="date" onclick="openCalendar()" style="cursor: pointer;">2月27日 星期五</div>
                <!-- <div id="date" class="nt-date">载入中...</div> -->
            </div>
            
            <div class="nt-search">
                <div id="nt-search-engine-current" class="nt-engine-trigger">
                    <img id="current-engine-icon" src="https://www.baidu.com/favicon.ico">
                    <span class="nt-search-arrow"></span>
                </div>
            
                <input type="text" id="nt-search-input" placeholder="输入搜索内容..." autofocus>
            
                <div class="nt-search-icon-right">🔍</div>
                <ul id="nt-search-suggestions" class="suggestion-list"></ul>
                <div id="nt-search-menu" class="nt-search-menu">
                    <div class="nt-engine-item" data-url="https://www.baidu.com/s?wd=" data-icon="https://www.baidu.com/favicon.ico">
                        <img src="https://www.baidu.com/favicon.ico"><span>百度</span>
                    </div>
                    <div class="nt-engine-item" data-url="https://www.google.com/search?q=" data-icon="https://www.google.com/favicon.ico">
                        <img src="https://www.google.com/favicon.ico"><span>Google</span>
                    </div>
                    <div class="nt-engine-item" data-url="https://cn.bing.com/search?q=" data-icon="https://cn.bing.com/favicon.ico">
                        <img src="https://cn.bing.com/favicon.ico"><span>必应</span>
                    </div>
                </div>
            </div>
												<div id="nt-category-tabs" class="nt-tabs"></div>
        </header>

        <section id="nt-scroll-area" class="nt-scroll-area">
            <div id="nt-featured-content">
                </div>
        </section>
<div id="poem-container" class="nt-poem">
    <span id="poem-content">正在撷取山河诗意...</span>
    <div id="poem-info">—— <span id="poem-author">加载中</span>《<span id="poem-title">加载中</span>》</div>
</div>
    </main>
<script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
    <script src="data.js"></script>
    <script src="newtab.js"></script>
				<script>
				    if ('serviceWorker' in navigator) {
				        window.addEventListener('load', () => {
				            // 注意这里的路径，确保 sw.js 在同级目录
				            navigator.serviceWorker.register('sw.js')
				                .then(reg => console.log('NewTab SW Registered'))
				                .catch(err => console.log('NewTab SW Failed', err));
				        });
				    }
				</script>
</body>
</html>
